services:
  # ── FastAPI ──────────────────────────────────────────────────────────────────
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      TZ: America/New_York
    volumes:
      - .:/app # hot-reload in dev

  # ── Pipeline — idle container used by Ofelia to run the incremental sync ─────
  pipeline:
    build: .
    command: sleep infinity
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: America/New_York
    volumes:
      - .:/app
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4G
    labels:
      ofelia.enabled: "true"
      ofelia.job-exec.incremental-pipeline.schedule: "0 30 20 * * *"
      ofelia.job-exec.incremental-pipeline.command: >-
        python -c "from app.utils.pipeline_data_collection import run_incremental_v1; run_incremental_v1()"
      ofelia.job-exec.incremental-pipeline.save-folder: /logs
      ofelia.job-exec.update-full-dataset.schedule: "0 0 2 * * *"
      ofelia.job-exec.update-full-dataset.command: >-
        python -m scripts.update_full_dataset
      ofelia.job-exec.update-full-dataset.save-folder: /logs
      ofelia.job-exec.incremental-backtest.schedule: "0 0 4 * * *"
      ofelia.job-exec.incremental-backtest.command: >-
        python -c "from strategies.iterative.backtest_helpers import run_iterative_incremental_backtest; run_iterative_incremental_backtest()"
      ofelia.job-exec.incremental-backtest.save-folder: /logs
      ofelia.job-exec.update-indices-dataset.schedule: "0 0 22 * * *"
      ofelia.job-exec.update-indices-dataset.command: >-
        python -m scripts.update_indices_dataset
      ofelia.job-exec.update-indices-dataset.save-folder: /logs
      ofelia.job-exec.update-stock-dataset.schedule: "0 30 21 * * 1-5"
      ofelia.job-exec.update-stock-dataset.command: >-
        python -c "from scripts.update_stock_dataset import run_incremental_stock_dataset_update; run_incremental_stock_dataset_update()"
      ofelia.job-exec.update-stock-dataset.save-folder: /logs

  # ── Backtest Dashboard — Streamlit ──────────────────────────────────────────
  dashboard:
    build: .
    command: streamlit run strategies/dashboard.py --server.port 8501 --server.address 0.0.0.0
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      TZ: America/New_York
    volumes:
      - .:/app

  # ── Logs Dashboard — Streamlit ───────────────────────────────────────────────
  logs-dashboard:
    build: .
    command: streamlit run strategies/logs_dashboard.py --server.port 8502 --server.address 0.0.0.0
    restart: unless-stopped
    ports:
      - "8502:8502"
    env_file: .env
    environment:
      TZ: America/New_York
    volumes:
      - .:/app

  # ── Signal Candle Dashboard — Streamlit ─────────────────────────────────────
  signal-candle-dashboard:
    build: .
    command: streamlit run strategies/signal_candle_dashboard.py --server.port 8503 --server.address 0.0.0.0
    restart: unless-stopped
    ports:
      - "8503:8503"
    env_file: .env
    environment:
      TZ: America/New_York
    volumes:
      - .:/app

  # ── Ofelia — cron scheduler (runs incremental pipeline every Friday 21:00 ET)
  ofelia:
    image: mcuadros/ofelia:latest
    restart: unless-stopped
    environment:
      TZ: America/New_York
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./logs/ofelia:/logs
    command: daemon --docker
    depends_on:
      - pipeline
