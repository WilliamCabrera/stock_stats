services:

  # ── FastAPI ──────────────────────────────────────────────────────────────────
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      TZ: America/New_York
    volumes:
      - .:/app           # hot-reload in dev

  # ── Pipeline — idle container used by Ofelia to run the incremental sync ─────
  pipeline:
    build: .
    command: sleep infinity
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: America/New_York
    volumes:
      - .:/app
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4G
    labels:
      ofelia.enabled: "true"
      ofelia.job-exec.incremental-pipeline.schedule: "0 30 20 * * *"
      ofelia.job-exec.incremental-pipeline.command: >-
        python -c "from app.utils.pipeline_data_collection import run_incremental_v1; run_incremental_v1()"
      ofelia.job-exec.incremental-pipeline.save-folder: /logs
      ofelia.job-exec.update-full-dataset.schedule: "0 0 2 * * *"
      ofelia.job-exec.update-full-dataset.command: >-
        python -m scripts.update_full_dataset
      ofelia.job-exec.update-full-dataset.save-folder: /logs

  # ── Ofelia — cron scheduler (runs incremental pipeline every Friday 21:00 ET)
  ofelia:
    image: mcuadros/ofelia:latest
    restart: unless-stopped
    environment:
      TZ: America/New_York
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./logs/ofelia:/logs
    command: daemon --docker
    depends_on:
      - pipeline
